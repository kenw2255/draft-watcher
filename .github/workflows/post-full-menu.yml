name: Post full Sabatini draft list

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sabatini-draft-watcher
  cancel-in-progress: false

jobs:
  post-full-menu:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: mcr.microsoft.com/playwright/python:v1.54.0-noble

    steps:
      - name: Check configuration
        id: configuration
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [[ -n "$DISCORD_WEBHOOK_URL" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DISCORD_WEBHOOK_URL is not configured; skipping this run."
          fi

      - name: Check out repository
        if: steps.configuration.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Load saved snapshot
        if: steps.configuration.outputs.ready == 'true'
        env:
          STATE_BRANCH: watcher-state
          STATE_FILE: data/state.json
        run: bash ci/load-state.sh

      - name: Post the full saved snapshot
        if: steps.configuration.outputs.ready == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATE_FILE: data/state.json
        run: python watch.py --post-saved-snapshot
