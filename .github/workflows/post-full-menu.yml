name: Post full Sabatini draft list

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sabatini-draft-watcher
  cancel-in-progress: false

jobs:
  post-full-menu:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check configuration
        id: configuration
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [[ -n "$DISCORD_WEBHOOK_URL" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DISCORD_WEBHOOK_URL is not configured; skipping this run."
          fi

      - name: Check out repository
        if: steps.configuration.outputs.ready == 'true'
        uses: actions/checkout@v5

      - name: Install Python dependencies
        if: steps.configuration.outputs.ready == 'true'
        run: |
          python3 -m pip install \
            --disable-pip-version-check \
            --target "$RUNNER_TEMP/python-packages" \
            -r requirements.txt
          echo "PYTHONPATH=$RUNNER_TEMP/python-packages" >> "$GITHUB_ENV"

      - name: Load saved snapshot
        if: steps.configuration.outputs.ready == 'true'
        env:
          STATE_BRANCH: watcher-state
          STATE_FILE: data/state.json
        run: bash ci/load-state.sh

      - name: Post the full saved snapshot
        if: steps.configuration.outputs.ready == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATE_FILE: data/state.json
        run: python3 watch.py --post-saved-snapshot
