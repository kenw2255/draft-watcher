name: Check Sabatini drafts

on:
  workflow_dispatch:
  schedule:
    - cron: "30 * * * *"

permissions:
  actions: write
  contents: write

concurrency:
  group: sabatini-draft-watcher
  cancel-in-progress: false

jobs:
  check-drafts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check configuration
        id: configuration
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [[ -n "$DISCORD_WEBHOOK_URL" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DISCORD_WEBHOOK_URL is not configured; skipping this run."
          fi

      - name: Check out repository
        if: steps.configuration.outputs.ready == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        if: steps.configuration.outputs.ready == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        if: steps.configuration.outputs.ready == 'true'
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Load previous state
        if: steps.configuration.outputs.ready == 'true'
        env:
          STATE_BRANCH: watcher-state
          STATE_FILE: data/state.json
        run: bash ci/load-state.sh

      - name: Check draft menu
        id: check
        if: steps.configuration.outputs.ready == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATE_FILE: data/state.json
        run: |
          set +e
          python watch.py
          status=$?
          if [[ $status -eq 78 ]]; then
            echo "parse_failure=true" >> "$GITHUB_OUTPUT"
          fi
          exit "$status"

      - name: Pause hourly checks after parse failure
        if: failure() && steps.check.outputs.parse_failure == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/workflows/check-drafts.yml/disable"
          echo "Hourly checks paused. Re-enable this workflow after fixing the parser."

      - name: Save current state
        if: steps.configuration.outputs.ready == 'true'
        env:
          STATE_BRANCH: watcher-state
          STATE_FILE: data/state.json
        run: bash ci/save-state.sh
